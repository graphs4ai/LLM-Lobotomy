# @package _global_
model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  wrapper: "llama"
  n_devices: 1  # Number of GPUs (increase if model doesn't fit on one GPU)
  dtype: "float16"  # "float16" or "bfloat16"

data:
  activations_artifact_name: "ebouhid-unicamp/activation-stance-classifier/activations-split_FS-Llama-3.1-8B-Instruct-all:v0"

extraction:
  batch_size: 8
  layers: "all"  # "all" or list like [14, 15, 16]
  device: "cuda"
  max_length: 1024

ipi_eval:
  use_chat_format: True
  multiplier_artifact_name: "ebouhid-unicamp/activation-stance-classifier/Llama-3.1-8B-Instruct_signed_minimize_multipliers:latest"

optimization:

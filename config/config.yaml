defaults:
  - _self_
  - model: null  # Leaves the model group blank by default
  - experiment: null  # Optional experiment matrix for pipeline orchestration

# Data paths
data:
  split_id: null
  feature_selection_dataset: "resources/split_FS.csv"
  optimization_dataset: "resources/split_optim.csv"
  validation_dataset: "resources/ipi_questions.csv"
  ipi_test_dataset: "resources/ipi_questions.csv"
  feature_selection_statements: "resources/split_FS.csv"
  optimization_statements: "resources/split_optim.csv"

# SVM training settings
training:
  test_size: 0.4
  random_state: 42
  kernel: "rbf"
  image_file: "svc_decision_boundary.png"
  class_weight: "balanced"

# Feature selection settings
feature_selection:
  enabled: true
  selectkbest_k: 1000
  prefilter: "f_classif"
  n_features: 100
  method: "anova_mrmr"
  method_mrmr: "MIQ"
  ranking_top_n: 256
  seed: 42

likert:
  condition: baseline
  multiplier_artifact_name: null
  prompt_template_version: default
  parser_version: default
  temperature: 0
  decoding_strategy: greedy

# IPI evaluation settings
ipi_eval:
  questions_csv: "resources/ipi_questions.csv"
  language: "pt"
  use_chat_format: true
  max_new_tokens: 10
  temperature: 0.0
  experiment_name: null
  activation_multipliers: null
  # W&B artifact name for multipliers (optional, overrides activation_multipliers)
  multiplier_artifact_name: null
  job_type: "likert_eval"

optimization:
  direction: minimize
  top_k: 80
  n_trials: 500
  seed: 42
  objective_mode: soft_ipi
  validation_fraction: null
  split_seed: 42

artifacts:
  activations_name: null
  feature_ranking_name: null
  multiplier_name: null
  likert_baseline_name: null
  likert_intervened_name: null

pipeline:
  dry_run: true
  resume: true
  force: false
  skip_existing: true

# Hydra output directory
hydra:
  run:
    dir: runs/${now:%Y-%m-%d}/${now:%H-%M-%S}

# W&B tracking
wandb:
  project: "activation-stance-classifier"
  run_name: null
  log_to_wandb: true

random_state: 42

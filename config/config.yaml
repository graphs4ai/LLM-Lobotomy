defaults:
  - _self_
  - model: null  # Leaves the model group blank by default
  - experiment: null  # Optional experiment matrix for pipeline orchestration

# Data paths
data:
  split_id: null
  feature_selection_dataset: "resources/split_FS.csv"
  optimization_dataset: "resources/split_optim.csv"
  validation_dataset: "resources/ipi_questions_val.csv"
  ipi_test_dataset: "resources/ipi_questions_test.csv"
  # W&B artifact name for activations input (set by the pipeline orchestrator;
  # standalone runs of train_eval_svc.py must override this explicitly).
  activations_artifact_name: null

# SVM training settings
training:
  test_size: 0.4
  random_state: 42
  kernel: "rbf"
  image_file: "svc_decision_boundary.png"
  class_weight: "balanced"

# Feature selection settings
feature_selection:
  enabled: true
  selectkbest_k: 1000
  prefilter: "f_classif"
  n_features: 100
  method: "anova_mrmr"
  method_mrmr: "MIQ"
  ranking_top_n: 256
  seed: 42

likert:
  condition: baseline
  eval_split: validation
  multiplier_artifact_name: null
  prompt_template_version: default
  parser_version: default
  temperature: 0
  decoding_strategy: greedy
  # Intervention scope used during Likert generation. See
  # `src/utils/intervention_hooks.py` for supported values. The legacy default
  # is `prompt_without_buffer` with `intervention_last_k=3`, which reproduces
  # the historical `buffer_size = 3` behavior. When a multipliers artifact is
  # loaded, its metadata overrides these values.
  intervention_scope: prompt_without_buffer
  intervention_last_k: 3

# IPI evaluation settings
ipi_eval:
  language: "pt"
  use_chat_format: true
  max_new_tokens: 10
  temperature: 0.0
  experiment_name: null
  activation_multipliers: null
  # W&B artifact name for multipliers (optional, overrides activation_multipliers)
  multiplier_artifact_name: null
  # job_type: "likert_eval"

optimization:
  direction: minimize
  top_k: 80
  n_trials: 500
  seed: 42
  objective_mode: soft_ipi
  validation_fraction: null
  split_seed: 42
  # W&B artifact name for the SVM feature ranking input (set by the pipeline
  # orchestrator; standalone runs of optimize_intervention.py must override
  # this explicitly).
  feature_artifact_name: null
  # Intervention scope used while optimizing multipliers. See
  # `src/utils/intervention_hooks.py` for supported values. The legacy default
  # is `prompt_without_buffer` with `intervention_last_k=3`, which reproduces
  # the historical `buffer_size = 3` behavior.
  intervention_scope: prompt_without_buffer
  intervention_last_k: 3

artifacts:
  activations_name: null
  feature_ranking_name: null
  multiplier_name: null
  likert_baseline_name: null
  likert_intervened_name: null

pipeline:
  dry_run: false
  resume: true
  force: false
  skip_existing: true

# Hydra output directory
hydra:
  run:
    dir: runs/${now:%Y-%m-%d}/${now:%H-%M-%S}

# W&B tracking
wandb:
  project: "LLM-Lobotomy"
  run_name: null
  log_to_wandb: true

random_state: 42
